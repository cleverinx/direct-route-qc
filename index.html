<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>QC Reports · Direct Route Design</title>
  <style>
    :root {
      --ink: #1e293b;
      --ink-3: #64748b;
      --line: #e2e8f0;
      --bg: #f8fafc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 32rem;
      width: 100%;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
    p { font-size: 0.9375rem; color: var(--ink-3); margin-bottom: 1.5rem; }
    ul { list-style: none; }
    li + li { margin-top: 0.5rem; }
    a {
      display: block;
      padding: 0.75rem 1rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover { border-color: #94a3b8; background: var(--bg); }
    a span { display: block; font-size: 0.8125rem; font-weight: 400; color: var(--ink-3); margin-top: 0.125rem; }
  </style>
</head>
<body>
  <main>
    <h1>QC Reports</h1>
    <p>Direct Route Design — quality assurance reports by project.</p>
    <ul>
      <li>
        <a href="/qotc/">
          Queen of the Castle
          <span>Homepage, episodes, wardrobe, fun zone &amp; more</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
